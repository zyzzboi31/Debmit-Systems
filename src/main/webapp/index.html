<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DEBMIT — Portal</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg:        #0b0c10;
      --surface:   #13141a;
      --border:    #1f2130;
      --accent:    #c8f04a;
      --accent-dim:#8faa2e;
      --text:      #e8eaf0;
      --muted:     #5a5e72;
      --glow:      rgba(200, 240, 74, 0.18);
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Syne', sans-serif;
      overflow: hidden;
    }

    /* Noise grain overlay */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      background-size: 180px;
      pointer-events: none;
      z-index: 0;
      opacity: 0.6;
    }

    /* Grid lines */
    body::after {
      content: '';
      position: fixed; inset: 0;
      background-image:
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 60px 60px;
      pointer-events: none;
      z-index: 0;
      opacity: 0.4;
    }

    /* Glow blob */
    .blob {
      position: fixed;
      width: 600px; height: 600px;
      background: radial-gradient(circle, rgba(200,240,74,0.07) 0%, transparent 70%);
      border-radius: 50%;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
      z-index: 0;
      animation: pulse 6s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.6; transform: translate(-50%,-50%) scale(1); }
      50%       { opacity: 1;   transform: translate(-50%,-50%) scale(1.12); }
    }

    /* Layout */
    .wrapper {
      position: relative;
      z-index: 1;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    /* Top tag */
    .tag {
      font-family: 'DM Mono', monospace;
      font-size: 0.7rem;
      letter-spacing: 0.25em;
      color: var(--accent);
      text-transform: uppercase;
      border: 1px solid var(--accent-dim);
      padding: 5px 14px;
      border-radius: 2px;
      margin-bottom: 36px;
      opacity: 0;
      animation: fadeUp 0.6s ease forwards 0.2s;
    }

    /* Heading */
    .hero-title {
      font-size: clamp(3.5rem, 9vw, 7rem);
      font-weight: 800;
      line-height: 0.95;
      letter-spacing: -0.03em;
      text-align: center;
      opacity: 0;
      animation: fadeUp 0.7s ease forwards 0.4s;
    }

    .hero-title span {
      color: var(--accent);
      position: relative;
      display: inline-block;
    }

    .hero-title span::after {
      content: '';
      position: absolute;
      bottom: 4px; left: 0; right: 0;
      height: 4px;
      background: var(--accent);
      border-radius: 2px;
      transform: scaleX(0);
      transform-origin: left;
      animation: scaleIn 0.5s ease forwards 1.1s;
    }

    @keyframes scaleIn {
      to { transform: scaleX(1); }
    }

    /* Sub */
    .hero-sub {
      margin-top: 24px;
      font-family: 'DM Mono', monospace;
      font-size: 0.85rem;
      font-weight: 300;
      color: var(--muted);
      letter-spacing: 0.05em;
      text-align: center;
      opacity: 0;
      animation: fadeUp 0.7s ease forwards 0.6s;
    }

    /* Divider */
    .divider {
      width: 1px;
      height: 48px;
      background: linear-gradient(to bottom, var(--border), var(--accent-dim));
      margin: 40px 0;
      opacity: 0;
      animation: fadeUp 0.5s ease forwards 0.8s;
    }

    /* CTA Button */
    .cta {
      position: relative;
      display: inline-block;
      padding: 16px 40px;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 0.9rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--bg);
      background: var(--accent);
      text-decoration: none;
      border-radius: 2px;
      overflow: hidden;
      opacity: 0;
      animation: fadeUp 0.7s ease forwards 1s;
      transition: color 0.3s ease, box-shadow 0.3s ease;
    }

    .cta::before {
      content: '';
      position: absolute;
      inset: 0;
      background: var(--bg);
      transform: translateX(-101%);
      transition: transform 0.35s cubic-bezier(0.77,0,0.18,1);
      z-index: 0;
    }

    .cta:hover::before { transform: translateX(0); }
    .cta:hover {
      color: var(--accent);
      box-shadow: 0 0 30px var(--glow);
    }

    .cta-text {
      position: relative;
      z-index: 1;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .cta-arrow {
      display: inline-block;
      transition: transform 0.3s ease;
    }
    .cta:hover .cta-arrow { transform: translateX(5px); }

    /* Corner labels */
    .corner {
      position: fixed;
      font-family: 'DM Mono', monospace;
      font-size: 0.65rem;
      color: var(--muted);
      letter-spacing: 0.1em;
      opacity: 0;
      animation: fadeUp 0.6s ease forwards 1.3s;
    }
    .corner-tl { top: 28px; left: 32px; }
    .corner-tr { top: 28px; right: 32px; text-align: right; }
    .corner-bl { bottom: 28px; left: 32px; }
    .corner-br { bottom: 28px; right: 32px; text-align: right; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <div class="blob"></div>

  <div class="corner corner-tl">DEBMIT // SYSTEMS</div>
  <div class="corner corner-tr">v1.0.0</div>
  <div class="corner corner-bl">EST. 2024</div>
  <div class="corner corner-br">SECURE ACCESS</div>

  <div class="wrapper">
    <div class="tag">&#9632; Portal Online</div>

    <h1 class="hero-title">
      Welcome to<br><span>DEBMIT</span>
    </h1>

    <p class="hero-sub">// Student &amp; User Management System</p>

    <div class="divider"></div>

    <a href="login.jsp" class="cta">
      <span class="cta-text">
        Enter Portal
        <span class="cta-arrow">&#8594;</span>
      </span>
    </a>
  </div>

</body>
</html>
